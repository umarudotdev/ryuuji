[meta]
name = "Kitsu"

# ── Dark variant ───────────────────────────────────────────────────
# Warm dark surfaces with Kitsu's orange-red brand accent (#F75239).

[dark.surface]
container_lowest = "#1A1215"
base = "#211820"
container_low = "#2A2028"
container = "#322830"
container_high = "#3C3038"
container_highest = "#463A42"
bright = "#524650"

[dark.text]
on_surface = "#F0E4E8"
on_surface_variant = "#C8B8BE"
outline = "#968488"
outline_variant = "#504448"

[dark.primary]
base = "#F75239"               # Kitsu orange-red
hover = "#FF6E58"
dim = "#D44530"
on_primary = "#FFFFFF"
container = "#6E2418"
on_container = "#FFB4A8"

[dark.secondary]
container = "#463A42"
on_container = "#C8B8BE"

[dark.tertiary]
base = "#FFC85C"               # warm gold
on_tertiary = "#1A1215"

[dark.error]
base = "#FF5252"
hover = "#D94444"
pressed = "#C03838"
on_error = "#FFFFFF"

[dark.status]
watching = "#F75239"
completed = "#4AD295"
on_hold = "#FFC85C"
dropped = "#FF5252"
plan = "#968488"

[dark.inverse]
surface = "#F0E4E8"
on_surface = "#211820"
scrim = "#000000"
modal_backdrop = "#000000BF"

